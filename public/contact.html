<!DOCTYPE html>
<html lang="en">
<head>
    <title>CLUB AUTO</title>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
   
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
 
    <link href="css/principal.css" rel="stylesheet">
    <link rel="stylesheet" href="css/header.css" rel="stylesheet">
    <link rel="stylesheet" href="css/contact.css" rel="stylesheet">
    <link rel="stylesheet" href="css/navbar.css" rel="stylesheet">
    <link rel="stylesheet" href="css/footer.css" rel="stylesheet">
</head>

<body>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybII0nDmx5K7bB2jsyD6A5Vr0b1PsvxWAWl3hBU5QKPx62K3C" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-qmYfAwlT+Rxnn7q9tGjb0a5e5T5AsdK5SrK57r9GpkkI1kMb0X3RQ5hFMJYz9aOg" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<div id="dynamic-header"></div>
    
<section class="container-fluid c1_menu">
    <div id="dynamic-navbar"></div>
    <div><img src="./images/vehicule3.jpg" class="img-fluid d-none d-md-block" alt="Image"></div>


    <div class="container-form">
      <div class="content-form">
          <div class="row">
            <div class="col-md-12">
            <h2 class="form-title">CONTACTEZ-NOUS</h2> <!-- Titre du formulaire -->
          </div>
          <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-3 custom-margin">
                  <label for="prenom">Prénom*</label>
                  <input type="text-form" id="prenom" name="prenom" class="form-control prenom" placeholder="Entrez votre prénom">
                  <div class="space-row"></div>
                  <label for="email">Email*</label>
                  <input type="text-form" id="email" name="email" class="form-control email" placeholder="Entrez votre adresse email valide">
                </div>

                <div class="col-md-3 custom-margin">
                  <label for="nom">Nom*</label>
                  <input type="text-form" id="nom" name="nom" class="form-control nom" placeholder="Entrez votre nom">
                  <div class="space-row"></div>
                  <label for="email">Telephone</label>
                  <input type="text-form" id="telephone" name="telephone" class="form-control telephone" placeholder="Phone number">
                </div>

                <div class="col-md-6 custom-margin">
                    <label for="message">Message :</label>
                    <input type="text-form" id="message" name="message" class="form-control message" placeholder="Entrez votre message">
                    <div class="space-row"></div>
                    <div class="submit-container">
                        <button type="submit" class="btn btn-primary">Envoyer</button>
                    </div>
                </div>
            </div>
          </div>
</div>
</section>

<div id="dynamic-footer"></div>

<script src="js/head-nav-foot.js"></script>

</body>
</html>
